---
# AI Code Review Role
# Performs comprehensive code review using the teim-review-agent in a single
# Claude invocation. Context extraction, commit summary, project guidelines
# extraction, and code review are all orchestrated by the agent.

- name: Verify prerequisite paths exist
  ansible.builtin.stat:
    path: "{{ item }}"
  register: ai_code_review_prereq_paths
  loop:
    - "{{ ai_code_review_style_guide_quick_rules }}"
    - "{{ ai_code_review_style_guide_comprehensive }}"
    - "{{ ai_code_review_knowledge_root }}"
    - "{{ ai_code_review_json_schema }}"
    - "{{ ai_code_review_inventory_file }}"

- name: Fail if prerequisite paths are missing
  ansible.builtin.fail:
    msg: "Missing prerequisite path: {{ item.item }}"
  when: not item.stat.exists
  loop: "{{ ai_code_review_prereq_paths.results }}"

- name: Create teim-review orchestration prompt
  ansible.builtin.set_fact:
    ai_code_review_review_prompt: >-
      Use the @teim-review-agent subagent to perform a complete code review.

      inventory_file: {{ ai_code_review_inventory_file }}
      output_dir: {{ ai_code_review_output_dir }}
      project_dir: {{ ai_code_review_project_src_dir }}
      style_guide_quick_rules: {{ ai_code_review_style_guide_quick_rules }}
      style_guide_comprehensive: {{ ai_code_review_style_guide_comprehensive }}
      knowledge_root: {{ ai_code_review_knowledge_root }}
      json_schema: {{ ai_code_review_json_schema }}
      tools_dir: {{ ai_code_review_style_guide_project }}/tools
      generate_html: false

      Write the structured JSON review report to
      {{ ai_code_review_report_file }}.
      Out-of-patch findings go in out_of_patch_observations, not in issues.

- name: Execute code review with Claude via teim-review-agent
  ansible.builtin.include_role:
    name: run_claude_code
  vars:
    run_claude_code_prompt_text: "{{ ai_code_review_review_prompt }}"
    run_claude_code_model_name: "{{ ai_code_review_model }}"
    run_claude_code_output_file: "{{ ai_code_review_report_file }}"
    run_claude_code_json_schema: "{{ ai_code_review_json_schema }}"
    run_claude_code_output_format: "json"
    run_claude_code_command_name: "code review"
    run_claude_code_working_dir: "{{ ai_code_review_project_src_dir }}"
    run_claude_code_claude_binary: "{{ ai_code_review_claude_binary }}"
    run_claude_code_anthropic_auth_token: "{{ ai_code_review_anthropic_auth_token }}"
    run_claude_code_anthropic_api_url: "{{ ai_code_review_anthropic_api_url }}"

# Claude CLI validates the structured_output against the schema automatically.
# The downstream Python scripts (HTML generation, Zuul comments) handle
# extracting the structured_output from the Claude CLI wrapper.
