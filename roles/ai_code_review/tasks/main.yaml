---
# AI Code Review Role
# Performs comprehensive code review using AI agent with structured output validation

- name: Verify prerequisite context files exist
  ansible.builtin.stat:
    path: "{{ item }}"
  register: ai_code_review_prereq_files
  loop:
    - "{{ ai_code_review_context_output_file }}"
    - "{{ ai_code_review_commit_summary_file }}"
    - "{{ ai_code_review_style_guide_quick_rules }}"
    - "{{ ai_code_review_style_guide_comprehensive }}"
    - "{{ ai_code_review_json_schema }}"

- name: Fail if prerequisite files missing
  ansible.builtin.fail:
    msg: "Missing prerequisite file: {{ item.item }}"
  when: not item.stat.exists
  loop: "{{ ai_code_review_prereq_files.results }}"

- name: Copy validation and repair scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_user_dir }}/{{ item | basename }}"
    mode: '0755'
  loop:
    - validate_review_schema.py
    - repair_review_json.py

- name: Create code review prompt with @file references and subagent invocation
  ansible.builtin.set_fact:
    ai_code_review_review_prompt: >-
      Use the @agent-code-review-agent subagent to
      perform a comprehensive code review of the change.

      Read @{{ ai_code_review_context_output_file }} for Zuul execution context.
      Read @{{ ai_code_review_commit_summary_file }} for commit metadata and change summary.
      Read @{{ ai_code_review_style_guide_quick_rules }} for essential OpenStack coding standards and rules.
      Read @{{ ai_code_review_style_guide_comprehensive }} for detailed explanations and complex scenarios.

      The project under review is located at: {{ ai_code_review_project_src_dir }}

      Generate a structured JSON review report conforming to the review-report-schema.json
      with severity-categorized findings (critical, high, warnings, suggestions).
      The output will be validated against the JSON schema automatically.

- name: Execute code review with Claude (structured output)
  ansible.builtin.include_role:
    name: run_claude_code
  vars:
    run_claude_code_prompt_text: "{{ ai_code_review_review_prompt }}"
    run_claude_code_model_name: "{{ ai_code_review_model }}"
    run_claude_code_output_file: "{{ ai_code_review_report_file }}"
    run_claude_code_json_schema: "{{ ai_code_review_json_schema }}"
    run_claude_code_output_format: "json"
    run_claude_code_command_name: "code review"
    run_claude_code_working_dir: "{{ ai_code_review_project_src_dir }}"
    run_claude_code_claude_binary: "{{ ai_code_review_claude_binary }}"
    run_claude_code_anthropic_auth_token: "{{ ai_code_review_anthropic_auth_token }}"
    run_claude_code_anthropic_api_url: "{{ ai_code_review_anthropic_api_url }}"

# Safety net: Validate JSON against schema (should pass with structured output)
- name: Validate JSON against schema (safety net)
  ansible.builtin.command:
    cmd: >-
      python3 {{ ansible_user_dir }}/validate_review_schema.py
      {{ ai_code_review_report_file }}
      --schema {{ ai_code_review_json_schema }}
  register: ai_code_review_json_validation
  failed_when: false
  changed_when: false

- name: Display validation result
  ansible.builtin.debug:
    msg: |
      JSON Schema Validation: {{ 'PASSED' if ai_code_review_json_validation.rc == 0 else 'FAILED' }}
      {% if ai_code_review_json_validation.rc != 0 %}
      Validation errors:
      {{ ai_code_review_json_validation.stderr | default(ai_code_review_json_validation.stdout) }}
      {% endif %}

# Repair layer: Attempt to fix JSON if validation failed
- name: Attempt JSON repair if validation failed
  ansible.builtin.command:
    cmd: >-
      python3 {{ ansible_user_dir }}/repair_review_json.py
      {{ ai_code_review_report_file }}
      --schema {{ ai_code_review_json_schema }}
      --output {{ ai_code_review_report_file }}
  register: ai_code_review_json_repair
  when: ai_code_review_json_validation.rc != 0
  failed_when: false
  changed_when: ai_code_review_json_repair.rc == 0

- name: Display repair result
  ansible.builtin.debug:
    msg: |
      JSON Repair: {{ 'SUCCEEDED' if ai_code_review_json_repair.rc == 0 else 'FAILED' }}
      {{ ai_code_review_json_repair.stdout | default('') }}
  when: ai_code_review_json_repair is defined and ai_code_review_json_repair.rc is defined

# Fallback layer: Generate minimal valid report if repair failed
- name: Generate fallback report if repair failed
  ansible.builtin.template:
    src: fallback-report.json.j2
    dest: "{{ ai_code_review_report_file }}"
    mode: '0644'
  when:
    - ai_code_review_json_repair is defined
    - ai_code_review_json_repair.rc is defined
    - ai_code_review_json_repair.rc != 0

- name: Log fallback report generation
  ansible.builtin.debug:
    msg: |
      WARNING: Generated fallback report due to JSON validation/repair failure.
      Original error: {{ ai_code_review_json_validation.stderr | default('unknown') }}
      Please review CI logs for details.
  when:
    - ai_code_review_json_repair is defined
    - ai_code_review_json_repair.rc is defined
    - ai_code_review_json_repair.rc != 0

- name: Extract issue statistics from JSON report
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      jq -r '.statistics |
      "Critical: \(.critical), High: \(.high),
      Warnings: \(.warnings), Suggestions: \(.suggestions),
      Total: \(.total)"'
      "{{ ai_code_review_report_file }}"
    executable: /bin/bash
  register: ai_code_review_issue_statistics
  changed_when: false

- name: Get total issue count from JSON
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      jq -r '.statistics.total'
      "{{ ai_code_review_report_file }}"
    executable: /bin/bash
  register: ai_code_review_issue_count_result
  changed_when: false

- name: Get critical + high issue count from JSON
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      jq -r '(.statistics.critical + .statistics.high)'
      "{{ ai_code_review_report_file }}"
    executable: /bin/bash
  register: ai_code_review_critical_high_count
  changed_when: false

- name: Set review result facts
  ansible.builtin.set_fact:
    ai_code_review_issue_count: "{{ ai_code_review_issue_count_result.stdout | int }}"
    ai_code_review_critical_high_issues: "{{ ai_code_review_critical_high_count.stdout | int }}"
    ai_code_review_has_issues: "{{ ai_code_review_issue_count_result.stdout | int > 0 }}"
    ai_code_review_has_critical_issues: "{{ ai_code_review_critical_high_count.stdout | int > 0 }}"
    ai_code_review_issue_statistics: "{{ ai_code_review_issue_statistics }}"

- name: Display review summary
  ansible.builtin.debug:
    msg: |
      Review Summary:
      {{ ai_code_review_issue_statistics.stdout }}
      Status: {{ 'NEEDS ATTENTION' if ai_code_review_has_critical_issues else ('HAS SUGGESTIONS' if ai_code_review_has_issues else 'CLEAN') }}
