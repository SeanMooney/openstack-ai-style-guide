---
# AI Review Setup Role
# Installs the teim-review plugin and configures the Claude CLI environment

- name: Install jq for JSON parsing
  ansible.builtin.package:
    name: jq
    state: present
  become: true

- name: Verify Claude CLI installation
  ansible.builtin.command: "{{ ai_review_setup_claude_binary }} --version"
  register: ai_review_setup_claude_version
  changed_when: false

- name: Display Claude CLI version
  ansible.builtin.debug:
    msg: "Using Claude CLI: {{ ai_review_setup_claude_version.stdout }}"

- name: Validate Claude config directory path
  ansible.builtin.stat:
    path: "{{ ai_review_setup_claude_config_dir }}"
  register: ai_review_setup_claude_config_stat

- name: Fail if Claude config path exists as a file
  ansible.builtin.fail:
    msg: >-
      Claude config directory path {{ ai_review_setup_claude_config_dir }}
      exists as a file, not a directory
  when: >-
    ai_review_setup_claude_config_stat.stat.exists and
    not ai_review_setup_claude_config_stat.stat.isdir

- name: Validate parent directory for Claude config is writable
  ansible.builtin.stat:
    path: "{{ ai_review_setup_claude_config_dir | dirname }}"
  register: ai_review_setup_claude_config_parent
  failed_when: >-
    not ai_review_setup_claude_config_parent.stat.exists or
    not ai_review_setup_claude_config_parent.stat.writeable

- name: Ensure Claude config directory exists
  ansible.builtin.file:
    path: "{{ ai_review_setup_claude_config_dir }}"
    state: directory
    mode: '0755'

- name: Configure Claude model mappings
  ansible.builtin.copy:
    content: |
      {
        "env": {
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "{{ ai_review_setup_haiku_model }}",
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "{{ ai_review_setup_sonnet_model }}",
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "{{ ai_review_setup_opus_model }}"
        }
      }
    dest: "{{ ai_review_setup_claude_config_dir }}/settings.json"
    mode: '0644'

- name: Verify style guide project directory exists
  ansible.builtin.stat:
    path: "{{ ai_review_setup_style_guide_project }}"
  register: ai_review_setup_style_guide_stat
  failed_when: >-
    not ai_review_setup_style_guide_stat.stat.exists or
    not ai_review_setup_style_guide_stat.stat.isdir

- name: Add teim-review plugin marketplace from style guide repo
  ansible.builtin.command: >-
    {{ ai_review_setup_claude_binary }} plugin marketplace add
    {{ ai_review_setup_style_guide_project }}
  environment:
    ANTHROPIC_AUTH_TOKEN: "{{ ai_review_setup_anthropic_auth_token }}"
    ANTHROPIC_BASE_URL: "{{ ai_review_setup_anthropic_api_url }}"
  register: ai_review_setup_marketplace_add
  changed_when: >-
    ai_review_setup_marketplace_add.stdout is search('added|installed|updated')

- name: Verify marketplace was registered
  ansible.builtin.assert:
    that:
      - ai_review_setup_marketplace_add.rc == 0
    fail_msg: >-
      Failed to register openstack-ai-style-guide marketplace
      (rc={{ ai_review_setup_marketplace_add.rc }}).
      stdout: {{ ai_review_setup_marketplace_add.stdout }}
      stderr: {{ ai_review_setup_marketplace_add.stderr }}

- name: Install teim-review plugin
  ansible.builtin.command: >-
    {{ ai_review_setup_claude_binary }} plugin install
    teim-review@openstack-ai-style-guide
  environment:
    ANTHROPIC_AUTH_TOKEN: "{{ ai_review_setup_anthropic_auth_token }}"
    ANTHROPIC_BASE_URL: "{{ ai_review_setup_anthropic_api_url }}"
  register: ai_review_setup_plugin_install
  changed_when: >-
    ai_review_setup_plugin_install.stdout is search('installed|updated')

- name: Verify teim-review plugin was installed
  ansible.builtin.assert:
    that:
      - ai_review_setup_plugin_install.rc == 0
    fail_msg: >-
      Failed to install teim-review plugin
      (rc={{ ai_review_setup_plugin_install.rc }}).
      stdout: {{ ai_review_setup_plugin_install.stdout }}
      stderr: {{ ai_review_setup_plugin_install.stderr }}

- name: Ensure output directories exist
  ansible.builtin.file:
    path: "{{ ai_review_setup_review_output_dir }}"
    state: directory
    mode: '0755'

- name: Display setup summary
  ansible.builtin.debug:
    msg: |
      AI Review Setup Complete:
      - Claude CLI: {{ ai_review_setup_claude_version.stdout }}
      - Config Dir: {{ ai_review_setup_claude_config_dir }}
      - Plugin: teim-review@openstack-ai-style-guide installed
      - Output Dir: {{ ai_review_setup_review_output_dir }}
      - Models: Haiku={{ ai_review_setup_haiku_model }}, Sonnet={{ ai_review_setup_sonnet_model }}, Opus={{ ai_review_setup_opus_model }}
